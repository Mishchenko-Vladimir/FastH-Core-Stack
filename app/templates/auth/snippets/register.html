<div id="modal-auth" class="modal-content slide-next" onclick="event.stopPropagation()">
    <span class="close-bg">
        <button class="btn-close" onclick="document.getElementById('auth-modal-content').innerHTML = ''">×</button>
    </span>
    <h2>Registration</h2>
    <form hx-post="/auth/register-handler" hx-target="#auth-modal-content">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <div class="input-box">
            <span class="icon"><ion-icon name="person"></ion-icon></span>
            <input type="text" name="first_name" placeholder=" " required>
            <label>Name</label>
        </div>
        <div class="input-box">
            <span class="icon"><ion-icon name="mail"></ion-icon></span>
            <input type="email" name="email" placeholder=" " required>
            <label>Email</label>
        </div>
        <div class="input-box">
            <span class="icon"><ion-icon name="lock-closed"></ion-icon></span>
            <input type="password" name="password" placeholder=" " required>
            <label>Password</label>
        </div>

        <div id="error-message" class="error-placeholder">
            {% if error %}
                {{ error }}
                <script>
                    (function() {
                        const errDiv = document.getElementById('error-message');
                        setTimeout(() => {
                            errDiv.classList.add('error-hidden');
                        }, 2500);

                        setTimeout(() => {
                            errDiv.innerHTML = '';
                            errDiv.classList.remove('error-hidden');
                        }, 3000);
                    })();
                </script>
            {% endif %}
        </div>

        <div class="remember-forgot">
            <label>
                <input type="checkbox" name="agreed" required>
                I agree to the
                <a hx-get="/auth/terms-fragment"
                   hx-target="#modal-auth"
                   hx-swap="innerHTML swap:300ms settle:0s"
                   class="link">
                    <span>terms & conditions</span>
                    <span class="spinner"></span>
                </a>
            </label>
        </div>

        <button type="submit" class="btn">
            <span>Register</span>
            <span class="spinner"></span>
        </button>

        <div class="login-register">
            <p>Already have an account?
                <a hx-get="/auth/login-form"
                   hx-target="#modal-auth"
                   hx-swap="outerHTML swap:300ms settle:0s"
                   class="link">
                    <span>Login</span>
                    <span class="spinner"></span>
                </a>
            </p>
        </div>
    </form>
</div>
