<div id="modal-auth" class="modal-content slide-next" onclick="event.stopPropagation()">
    <span class="close-bg">
         <button class="btn-close" onclick="document.getElementById('auth-modal-content').innerHTML = ''">×</button>
     </span>

    <h3>Forgot password</h3>
    <form hx-post="/auth/forgot-password" hx-target="#auth-modal-content">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
         <div class="input-box">
             <span class="icon"><ion-icon name="mail"></ion-icon></span>
             <input type="email" name="email" placeholder=" " required>
             <label>Email</label>
         </div>

        <div id="error-message" class="error-placeholder">
            {% if error %}
                <span class="success-message">{{ error }}</span>
                <script>
                    (function() {
                        const errDiv = document.getElementById('error-message');
                        setTimeout(() => {
                            errDiv.classList.add('error-hidden');
                        }, 4500);

                        setTimeout(() => {
                            errDiv.innerHTML = '';
                            errDiv.classList.remove('error-hidden');
                        }, 5000);
                    })();
                </script>
            {% endif %}
        </div>

        <button type="submit" class="btn" hx-target="#auth-modal-content">
            <span>Send email</span>
            <span class="spinner"></span>
        </button>

        <div class="login-register">
            <p>Don't have an account?
                <a hx-get="/auth/register-form"
                   hx-target="#modal-auth"
                   hx-swap="outerHTML swap:300ms settle:0s"
                   class="link">
                    <span>Register</span>
                    <span class="spinner"></span>
                </a>
            </p>
        </div>
    </form>
</div>
