<div id="modal-auth" class="modal-content" onclick="event.stopPropagation()">
    {% if success %}
        <div>
            <ion-icon name="checkmark-circle-outline" class="success-message"></ion-icon>
            <h2>Password Updated</h2>
            <p>Your password has been changed successfully.</p>
            <a href="/" class="btn">Go to Home</a>
        </div>
    {% else %}
        <h2>New Password</h2>
        <p>Please enter your new password below.</p>

        <form hx-post="{{ url_for('process_password_reset') }}" hx-target="#modal-auth" hx-swap="outerHTML">
            <input type="hidden" name="token" value="{{ token }}">

            <div class="input-box">
                <span class="icon"><ion-icon name="lock-closed" class="small-icon"></ion-icon></span>
                <input type="password" name="password" placeholder=" " required>
                <label>New Password</label>
            </div>

            <div id="error-message" class="error-placeholder">
                {% if error %}{{ error }}{% endif %}
            </div>

            <button type="submit" class="btn">
                <span>Reset Password</span>
                <span class="spinner"></span>
            </button>
        </form>
    {% endif %}
</div>
